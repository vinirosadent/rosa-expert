<!DOCTYPE html>
<!--
  ================================================================
  PUBLICATION PAGE TEMPLATE — rosa.expert
  ================================================================
  HOW TO CREATE A NEW PUBLICATION PAGE:

  1. Copy this file as   publications/[slug].html
     Use a slug derived from the paper title (lowercase, hyphens).

  2. Add/update the entry in PUBS[] in assets/js/data/pubs.js:
     - Add a `slug` field: slug: 'your-publication-slug'
     - Add a `featured` flag if it should appear in the featured grid
     The publication card on publications.html will auto-link to
     this page once a `slug` field is present on the PUBS entry.

  3. The page reads `PUB_SLUG` (set below) to find its own data
     from the PUBS array. All content renders from that object.

  DATA MODEL (add these fields to the PUBS entry):
  ─────────────────────────────────────────────────
  slug        — string, matches filename without .html
  title       — full citation title
  authors     — full author list string (e.g. "Rosa V, Nör JE, ...")
  venue       — journal / book name
  year        — publication year (number)
  volume      — volume/issue string (optional)
  pages       — page range string (optional)
  doi         — DOI string without "https://doi.org/" prefix (optional)
  category    — 'bio' | 'regen' | 'ai'
  featured    — true | false
  badge       — short label for featured card (e.g. "IADR Award 2026")
  summary     — 1–2 sentence plain-language summary
  abstract    — full abstract text (optional)
  keywords    — array of strings (optional)
  coverImage  — URL to journal cover or graphical abstract (optional)
  impact      — IF or recognition note (optional, e.g. "IF 10.3 · 2024")

  CATEGORY COLOUR MAP:
  'bio'  → blue  (Biomaterials & biointerfaces)
  'regen'→ teal  (Regeneration & living models)
  'ai'   → orange (AI, methods & translation)
  ================================================================
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Publication — Vinicius Rosa · NUS Faculty of Dentistry</title>
<meta name="description" content="">
<link rel="stylesheet" href="../assets/css/tokens.css">
<link rel="stylesheet" href="../assets/css/components.css">
<style>
/* ── Publication page layout ──────────────────────────────── */
.pub-page {
  min-height: 60vh;
  padding-bottom: var(--space-20);
}

/* ── Header banner ────────────────────────────────────────── */
.pub-banner {
  width: 100%;
  padding: var(--space-12) 0 var(--space-10);
}
.pub-banner-inner {
  max-width: var(--container-narrow);
  margin: 0 auto;
  padding: 0 var(--gutter);
}
.pub-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-decoration: none;
  margin-bottom: var(--space-6);
}
.pub-back:hover { color: var(--text-body); }
.pub-title {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: clamp(1.5rem, 3vw, 2.1rem);
  line-height: 1.25;
  color: var(--text-strong);
  margin-top: var(--space-4);
}
.pub-authors-line {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-top: var(--space-4);
}
.pub-venue-line {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px 16px;
  margin-top: var(--space-6);
  padding-top: var(--space-5);
  border-top: 1px solid var(--border-subtle);
  font-size: 13px;
}
.pub-venue-name {
  font-weight: 700;
  letter-spacing: .02em;
  color: var(--text-strong);
}
.pub-venue-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--border-strong);
  display: inline-block;
}
.pub-venue-meta { color: var(--text-faint); }

/* ── Cover image ──────────────────────────────────────────── */
.pub-cover {
  max-width: var(--container-narrow);
  margin: 0 auto var(--space-8);
  padding: 0 var(--gutter);
}
.pub-cover img {
  width: 100%;
  max-height: 340px;
  object-fit: cover;
  border-radius: var(--radius-md);
  display: block;
}

/* ── Body columns ─────────────────────────────────────────── */
.pub-body-wrap {
  max-width: var(--container-narrow);
  margin: 0 auto;
  padding: 0 var(--gutter);
}
.pub-section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: var(--space-3);
  margin-top: var(--space-8);
}
.pub-summary-text {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 18px;
  line-height: 1.6;
  color: var(--text-body);
  margin-bottom: var(--space-6);
}
.pub-abstract-text {
  font-size: 16px;
  line-height: 1.75;
  color: var(--text-body);
}
.pub-doi-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: var(--space-6);
  padding: 12px 20px;
  border-radius: var(--radius-md);
  background: var(--wash-blue);
  color: var(--blue-700);
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  border: 1px solid var(--blue-200);
}
.pub-doi-link:hover { background: var(--blue-50); }
.pub-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: var(--space-8);
  padding-top: var(--space-6);
  border-top: 1px solid var(--border-subtle);
}

/* ── Related publications ─────────────────────────────────── */
.pub-related {
  margin-top: var(--space-14);
  padding-top: var(--space-8);
  border-top: 1px solid var(--border-subtle);
  max-width: var(--container-base);
  margin-left: auto;
  margin-right: auto;
  padding-left: var(--gutter);
  padding-right: var(--gutter);
}
.pub-related-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-6);
  margin-top: var(--space-8);
}
@media (max-width: 900px) {
  .pub-related-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .pub-related-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="app">
<main class="pub-page">
  <div id="pub-banner"  class="pub-banner"></div>
  <div id="pub-cover"   class="pub-cover"></div>
  <div id="pub-body"    class="pub-body-wrap"></div>
  <div id="pub-related" class="pub-related" style="display:none;"></div>
</main>
</div><!-- /app -->

<script src="../assets/js/data/pubs.js"></script>
<script src="../assets/js/shared.js"></script>
<script>
// ── Detect publication slug from URL ───────────────────────
const pubSlug = window.location.pathname
  .split('/').pop()
  .replace(/\.html$/, '');

// ── Find pub data ──────────────────────────────────────────
const pub = (typeof PUBS !== 'undefined')
  ? PUBS.find(p => p.slug === pubSlug) : null;

// ── Category labels + colours ──────────────────────────────
function catInfo(cat) {
  if (cat === 'ai')   return { label: 'AI, Methods & Translation',   tagCls: 'tag-orange', wash: 'var(--wash-orange)', ink: 'var(--orange-600)' };
  if (cat === 'regen')return { label: 'Regeneration & Living Models', tagCls: 'tag-teal',   wash: 'var(--wash-teal)',   ink: 'var(--teal-600)' };
  return                     { label: 'Biomaterials & Biointerfaces', tagCls: 'tag-blue',   wash: 'var(--wash-blue)',   ink: 'var(--blue-600)' };
}

// ── Render ─────────────────────────────────────────────────
(function render() {
  if (!pub) {
    document.getElementById('pub-banner').innerHTML =
      `<div style="max-width:var(--container-narrow);margin:0 auto;padding:var(--space-16) var(--gutter);">
        <p style="color:var(--text-muted);">Publication not found.</p>
       </div>`;
    return;
  }

  const ci = catInfo(pub.category);

  // ── Update page metadata
  document.title = pub.title + ' — Vinicius Rosa · NUS Faculty of Dentistry';
  const metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute('content', pub.summary || pub.title);

  // ── Banner
  let venueLine = `<span class="pub-venue-name">${pub.venue || ''}</span>`;
  if (pub.year)   venueLine += `<span class="pub-venue-dot"></span><span class="pub-venue-meta">${pub.year}</span>`;
  if (pub.volume) venueLine += `<span class="pub-venue-dot"></span><span class="pub-venue-meta">${pub.volume}</span>`;
  if (pub.pages)  venueLine += `<span class="pub-venue-dot"></span><span class="pub-venue-meta">pp. ${pub.pages}</span>`;
  if (pub.impact) venueLine += `<span class="pub-venue-dot"></span><span class="pub-venue-meta" style="color:var(--teal-600);">${pub.impact}</span>`;

  document.getElementById('pub-banner').innerHTML = `
    <div class="pub-banner-inner">
      <a href="../publications.html" class="pub-back">← Publications</a>
      <div class="eyebrow" style="margin-top:0;">${ci.label}</div>
      <h1 class="pub-title">${pub.title}</h1>
      ${pub.authors ? `<p class="pub-authors-line">${pub.authors}</p>` : ''}
      <div class="pub-venue-line">${venueLine}</div>
    </div>
  `;

  // ── Cover image (if any)
  if (pub.coverImage) {
    document.getElementById('pub-cover').innerHTML =
      `<img src="${pub.coverImage}" alt="Journal cover or graphical abstract">`;
  }

  // ── Body
  let bodyHTML = '';

  // Plain-language summary
  if (pub.summary) {
    bodyHTML += `
      <div class="pub-section-label">Plain-language summary</div>
      <div class="pub-summary-text">${pub.summary}</div>
    `;
  }

  // Abstract
  if (pub.abstract) {
    bodyHTML += `
      <div class="pub-section-label">Abstract</div>
      <p class="pub-abstract-text">${pub.abstract}</p>
    `;
  }

  // DOI / full text link
  if (pub.doi) {
    bodyHTML += `
      <a href="https://doi.org/${pub.doi}" target="_blank" rel="noopener" class="pub-doi-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
        View on DOI: ${pub.doi}
      </a>
    `;
  }

  // Keywords / tags
  if (pub.keywords && pub.keywords.length) {
    const tagsHTML = pub.keywords.map(k =>
      `<span class="tag ${ci.tagCls}">${k}</span>`
    ).join('');
    bodyHTML += `<div class="pub-tags">${tagsHTML}</div>`;
  }

  document.getElementById('pub-body').innerHTML = bodyHTML || '<p style="color:var(--text-muted);">Publication data not yet available.</p>';

  // ── Related (other featured publications in same category)
  const related = PUBS
    .filter(p => p.slug && p.slug !== pubSlug && p.category === pub.category && p.featured)
    .slice(0, 3);

  if (related.length) {
    const relEl = document.getElementById('pub-related');
    relEl.style.display = '';
    relEl.innerHTML = `
      <div class="eyebrow" style="margin-bottom:var(--space-2);">Related publications</div>
      <div class="pub-related-grid">
        ${related.map(r => {
          const rci = catInfo(r.category);
          return `<a href="${r.slug}.html" class="pub-card" style="text-decoration:none;">
            <div class="pub-card-thumb" style="background:${rci.wash};">
              <span class="pub-card-cat" style="color:${rci.ink};">${r.badge || rci.label}</span>
            </div>
            <div class="pub-card-body">
              <div class="pub-title" style="font-size:14px;line-height:1.4;">${r.title}</div>
              <div class="pub-venue-row">
                <span class="pub-venue">${r.venue}</span>
                <span class="pub-year">${r.year}</span>
              </div>
            </div>
          </a>`;
        }).join('')}
      </div>
    `;
  }
})();
</script>
</body>
</html>
