<!DOCTYPE html>
<!--
  ================================================================
  NEWS ARTICLE TEMPLATE — rosa.expert
  ================================================================
  HOW TO CREATE A NEW NEWS PAGE:

  1. Copy this file as   news/[slug].html
     The slug must match NEWS[].slug and ARTICLES[].slug in news.js.

  2. Add an entry to ARTICLES[] in assets/js/data/news.js:
     {
       id:             'nX',
       slug:           'your-article-slug',
       category:       'press',            // press | awards | appointments | institutional
       tone:           'blue',             // blue | orange | teal  (accent colour)
       source:         'Publication Name',
       date:           'Month Year',
       readTime:       '4 min read',
       headline:       `Full article headline`,  // backtick — avoids quote escaping
       deck:           `One- or two-sentence standfirst.`,
       heroVariant:    'image',            // image | teal-banner | orange-banner | video | stat
       heroImage:      null,               // URL string — only for heroVariant:'image'/'video'
       heroCaption:    'Caption text.',    // image/video: photo caption
                                           // teal-banner: subtitle below institution name
                                           // orange-banner: award name
                                           // stat: stat value (e.g. 'Top 2%')
       heroPhotoCredit:'Credit: Source.', // image/video: credit line
                                           // stat: label below the number
       body:           [                   // paragraphs in reading order
         "First paragraph text.",
         "Second paragraph text.",
         "Third paragraph text.",          // ← pull-quote injected after this one
         "Fourth paragraph text.",
         // add as many as needed
       ],
       pullQuote:      'A memorable quote from the article.',  // optional
       tags:           [
         { label: 'Tag Label', tone: 'blue' },  // tone: blue | orange | teal
       ],
       externalUrl:    'https://...',       // optional — link to original article
       externalCTA:    'Read full story on Source ↗',
       relatedIds:     ['n2', 'n3'],        // up to 3 NEWS ids
     }

  3. Add a matching entry to NEWS[] (for listing cards):
     { id: 'nX', slug: '...', source, date, tone, headline, category }

  HERO VARIANTS
  ─────────────
  'image'         Photo (16:7). heroImage = URL.
                  Falls back to blue-teal gradient if heroImage is null.
                  heroCaption + heroPhotoCredit shown below.

  'teal-banner'   Light teal gradient panel (16:6). Institutional/appointments.
                  Displays: eyebrow (category) · source (large) · heroCaption (subtitle).

  'orange-banner' Light orange gradient panel (16:6). Awards/recognition.
                  Medal ★ circle + heroCaption (award name) + source · date.

  'video'         16:9 iframe embed. heroImage = embed URL.

  'stat'          Stat callout panel. heroCaption = stat value. heroPhotoCredit = label.

  DESIGN RULES
  ────────────
  • Hero is inside the 760 px master wrapper — same bounds as body text.
  • Back link and separator are in the global 1080 px grid (outside the 760 px column).
  • Related posts break out to the full 1080 px grid.
  • Do NOT copy HTML structure — the page self-renders from news.js data.
  ================================================================
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Title and description are set dynamically from ARTICLES data -->
<title>News — Vinicius Rosa · NUS Faculty of Dentistry</title>
<meta name="description" content="">
<link rel="stylesheet" href="../assets/css/tokens.css">
<link rel="stylesheet" href="../assets/css/components.css">
<style>
/* ── Article page ─────────────────────────────────────────── */
.art-page {
  min-height: 60vh;
  padding-bottom: var(--space-20);
}

/* Global horizontal container (1080 px) ─────────────────── */
.art-global {
  max-width: var(--container-base);
  margin: 0 auto;
  padding: 0 var(--gutter);
}

/* ── Back link — outside 760 px, in 1080 px grid ─────────── */
.art-back {
  display: block;
  padding: 28px 0 16px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-faint);
  text-decoration: none;
  letter-spacing: 0;
  text-transform: none;
}
.art-back:hover { color: var(--text-muted); }

/* #art-nav carries the separator as its own border-bottom,
   so the line spans the same border-box width as .art-related's border-top */
#art-nav {
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 40px;
}

/* ── Article master column (760 px) ──────────────────────── */
.art-master {
  max-width: var(--container-narrow);
  margin: 0 auto;
}

/* ── Badge + extending rule row ──────────────────────────── */
.art-badge-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
}
.art-badge {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .10em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 100px;
  white-space: nowrap;
}
.art-badge-blue   { background: var(--wash-blue);   color: var(--blue-700); }
.art-badge-orange { background: var(--wash-orange); color: var(--orange-600); }
.art-badge-teal   { background: var(--wash-teal);   color: var(--teal-700); }
.art-badge-rule {
  flex: 1;
  height: 1px;
  background: var(--border-subtle);
}

/* ── Meta line ───────────────────────────────────────────── */
.art-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.art-meta-source { white-space: nowrap; }
.art-meta-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--border-strong);
  display: inline-block;
  flex-shrink: 0;
}

/* ── Headline ────────────────────────────────────────────── */
.art-headline {
  font-family: var(--font-serif);
  font-size: var(--fs-page-title);
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1.07;
  color: var(--text-strong);
  margin: 0 0 20px;
}

/* ── Deck ────────────────────────────────────────────────── */
.art-deck {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 18.5px;
  line-height: 1.6;
  color: var(--text-muted);
  margin: 0;
}

/* ── Body ────────────────────────────────────────────────── */
.art-body {
  margin-top: 32px;
}
.art-body p {
  font-size: 17px;
  line-height: 1.8;
  color: var(--text-body);
  margin-bottom: 22px;
  text-align: justify;
  hyphens: auto;
  -webkit-hyphens: auto;
}

/* ── Photo caption (image/video only) ───────────────────── */
.art-caption {
  font-size: 13px;
  color: var(--text-faint);
  line-height: 1.5;
  margin: 10px 0 32px;
}

/* ── Tags ────────────────────────────────────────────────── */
.art-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: var(--space-8);
  padding-top: 20px;
  border-top: 1px solid var(--border-subtle);
}

/* ── Related section (1080 px) ───────────────────────────── */
.art-related {
  max-width: var(--container-base);
  width: 100%;
  margin: var(--space-8) auto 0;
  padding: 24px var(--gutter) 0;
  border-top: 1px solid var(--border-subtle);
}
.art-related-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-6);
  margin-top: var(--space-8);
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .art-related-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .art-related-grid { grid-template-columns: 1fr; }
  .art-headline { line-height: 1.12; }
}
</style>
</head>
<body>
<div id="app">
<main class="art-page">

  <!-- Back link + separator — global 1080 px grid, NOT inside 760 px column -->
  <div class="art-global" id="art-nav"></div>

  <!-- Article master column (760 px) — hero lives inside this wrapper -->
  <div class="art-global">
    <div class="art-master">
      <article id="art-content" lang="en"></article>
    </div>
  </div>

  <!-- Related posts — breaks out to full 1080 px -->
  <div id="art-related" class="art-related" style="display:none;"></div>

</main>
</div><!-- /app -->

<script src="../assets/js/data/news.js"></script>
<script src="../assets/js/shared.js"></script>
<script>
// ── Detect slug from URL pathname ──────────────────────────
const slug = window.location.pathname
  .split('/').pop()
  .replace(/\.html$/, '');

// ── Find article data ──────────────────────────────────────
const article = (typeof ARTICLES !== 'undefined')
  ? ARTICLES.find(a => a.slug === slug) : null;

// ── Update <title> and <meta description> ─────────────────
if (article) {
  document.title = article.headline + ' — Vinicius Rosa · NUS Faculty of Dentistry';
  const metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute('content', article.deck || '');
}

// ── Category display labels ────────────────────────────────
const CATEGORY_LABELS = {
  press:         'Press',
  awards:        'Award',
  appointments:  'Appointment',
  institutional: 'Institutional',
};

// ── Badge tone from category ───────────────────────────────
function badgeTone(cat) {
  if (cat === 'awards')                         return 'orange';
  if (cat === 'appointments' || cat === 'institutional') return 'teal';
  return 'blue';
}

// ── Source colour inline style by article tone ─────────────
function sourceColor(tone) {
  if (tone === 'orange') return 'color:var(--orange-600)';
  if (tone === 'teal')   return 'color:var(--teal-600)';
  return 'color:var(--blue-700)';
}

// ── Tag CSS class ──────────────────────────────────────────
function tagClass(tone) {
  if (tone === 'orange') return 'tag-orange';
  if (tone === 'teal')   return 'tag-teal';
  return 'tag-blue';
}

// ── Caption string (image / video only) ───────────────────
function buildCaptionHTML(a) {
  if (!a.heroCaption && !a.heroPhotoCredit) return '';
  let txt = a.heroCaption ? `${a.heroCaption}` : '';
  if (a.heroPhotoCredit)
    txt += (txt ? ' ' : '') + `<span style="color:var(--text-faint);">${a.heroPhotoCredit}</span>`;
  return `<p class="art-caption">${txt}</p>`;
}

// ── Hero HTML — all variants sit inside the 760 px column ──
function buildHero(a) {
  const R   = 'border-radius:12px;';
  const MT  = 'margin-top:36px;';
  const cat = CATEGORY_LABELS[a.category] || a.category;

  switch (a.heroVariant) {

    /* ── Variant A: photo / gradient fallback (press) ─────── */
    case 'image':
      return `
        <div style="aspect-ratio:16/7;${MT}overflow:hidden;${R}background:linear-gradient(135deg,var(--blue-100),var(--teal-200));">
          ${a.heroImage ? `<img src="${a.heroImage}" alt="${a.headline}" style="width:100%;height:100%;object-fit:cover;">` : ''}
        </div>
        ${buildCaptionHTML(a)}`;

    /* ── Variant B: light teal panel (institutional / appt) ── */
    case 'teal-banner':
      return `
        <div style="aspect-ratio:16/6;${MT}${R}background:linear-gradient(135deg,var(--teal-50),var(--teal-100) 50%,#F5F8FA);border:1px solid var(--teal-200);display:flex;align-items:center;justify-content:center;text-align:center;padding:32px 40px;">
          <div>
            <div style="font-size:11px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--teal-500);margin-bottom:16px;">${cat}</div>
            <div style="font-family:var(--font-serif);font-size:clamp(1.4rem,3vw,2rem);font-weight:600;color:var(--teal-700);line-height:1.2;">${a.source}</div>
            ${a.heroCaption
              ? `<div style="width:40px;height:2px;background:var(--teal-300);margin:16px auto 12px;"></div>
                 <div style="font-size:14px;font-style:italic;color:var(--teal-600);">${a.heroCaption}</div>`
              : ''}
          </div>
        </div>`;

    /* ── Variant C: light orange panel (awards) ───────────── */
    case 'orange-banner':
      return `
        <div style="aspect-ratio:16/6;${MT}${R}background:linear-gradient(135deg,var(--orange-50),var(--orange-100) 60%,var(--orange-200));border:1px solid var(--orange-200);display:flex;align-items:center;justify-content:center;gap:32px;padding:32px 40px;flex-wrap:wrap;">
          <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--orange-400),var(--orange-600));display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="font-size:26px;color:#fff;">&#9733;</span>
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--orange-600);margin-bottom:8px;">${cat}</div>
            <div style="font-family:var(--font-serif);font-size:clamp(1.1rem,2.5vw,1.6rem);font-weight:600;color:var(--text-strong);line-height:1.25;max-width:380px;">${a.heroCaption || a.source}</div>
            <div style="font-size:12px;color:var(--orange-600);margin-top:8px;font-weight:500;">${a.source} &middot; ${a.date}</div>
          </div>
        </div>`;

    /* ── Variant D: video embed ───────────────────────────── */
    case 'video':
      return `
        <div style="aspect-ratio:16/9;${MT}overflow:hidden;${R}">
          <iframe src="${a.heroImage || ''}" allowfullscreen loading="lazy" title="${a.headline}" style="width:100%;height:100%;border:none;display:block;"></iframe>
        </div>
        ${buildCaptionHTML(a)}`;

    /* ── Variant E: stat callout panel ───────────────────── */
    case 'stat':
      return `
        <div style="background:var(--wash-blue);border:1px solid var(--blue-100);border-radius:16px;padding:44px 48px;text-align:center;${MT}margin-bottom:40px;">
          <div style="font-family:var(--font-serif);font-size:68px;font-weight:700;color:var(--blue-700);line-height:1;">${a.heroCaption || ''}</div>
          <div style="width:60px;height:2px;background:var(--orange-400);margin:16px auto;"></div>
          <div style="font-size:16px;color:var(--text-muted);font-style:italic;">${a.heroPhotoCredit || ''}</div>
        </div>`;

    default:
      return '';
  }
}

// ── Body HTML (paragraphs + pull-quote + tags + CTA) ───────
function buildBody(a) {
  const paras = a.body || [];
  let html = '<div class="art-body">';

  paras.forEach(function(p, i) {
    html += `<p>${p}</p>`;
    // Pull-quote after the 3rd paragraph (index 2)
    if (i === 2 && a.pullQuote) {
      html += `
        <div style="margin:10px 0 38px;text-align:center;">
          <span style="font-family:var(--font-serif);font-size:88px;line-height:0.6;color:var(--orange-200);user-select:none;display:block;margin-bottom:10px;">“</span>
          <p style="font-family:var(--font-serif);font-style:italic;font-size:23px;line-height:1.44;color:var(--text-strong);max-width:520px;margin:0 auto;">${a.pullQuote}</p>
        </div>`;
    }
  });

  // Tags
  if (a.tags && a.tags.length) {
    html += `<div class="art-tags">
      ${a.tags.map(function(t){ return `<span class="tag ${tagClass(t.tone)}" style="text-transform:none;letter-spacing:.02em;">${t.label}</span>`; }).join('')}
    </div>`;
  }

  // External CTA — ghost button style
  if (a.externalUrl) {
    html += `<div style="margin-top:16px;">
      <a href="${a.externalUrl}" target="_blank" rel="noopener"
         style="display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--blue-700);border:1.5px solid var(--border-strong);padding:10px 20px;border-radius:10px;text-decoration:none;">
        ${a.externalCTA || 'Read original →'}
      </a>
    </div>`;
  }

  html += '</div>';
  return html;
}

// ── Related mini-card (image-top style) ───────────────────
function relatedCardHTML(item) {
  return `<a href="${item.slug}.html" style="text-decoration:none;display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid var(--border-subtle);background:#fff;">
    <div class="nc-feat-img-${item.tone}" style="height:130px;flex-shrink:0;"></div>
    <div style="padding:16px 18px 18px;flex:1;display:flex;flex-direction:column;">
      <div style="font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;">${item.source} / ${item.date}</div>
      <div style="font-size:14.5px;line-height:1.45;font-weight:500;color:var(--text-strong);flex:1;">${item.headline}</div>
      <span style="display:inline-block;margin-top:12px;font-size:13px;font-weight:500;color:var(--text-muted);">Read more →</span>
    </div>
  </a>`;
}

// ── Render ─────────────────────────────────────────────────
(function render() {
  var navEl     = document.getElementById('art-nav');
  var contentEl = document.getElementById('art-content');
  var relatedEl = document.getElementById('art-related');

  // Always render the back link + separator
  navEl.innerHTML = '<a href="../news.html" class="art-back">← All news</a>';

  if (!article) {
    contentEl.innerHTML =
      '<p style="color:var(--text-muted);padding:var(--space-16) 0;">Article not found.</p>';
    return;
  }

  var a        = article;
  var catLabel = CATEGORY_LABELS[a.category] || a.category;
  var bTone    = badgeTone(a.category);

  // Full article content inside 760 px column
  contentEl.innerHTML =
    // Badge + extending rule
    '<div class="art-badge-row">' +
      '<span class="art-badge art-badge-' + bTone + '">' + catLabel + '</span>' +
      '<div class="art-badge-rule"></div>' +
    '</div>' +

    // Meta: source · date · read time
    '<div class="art-meta">' +
      '<span class="art-meta-source" style="' + sourceColor(a.tone) + '">' + a.source + '</span>' +
      '<span class="art-meta-dot"></span>' +
      '<span>' + a.date + '</span>' +
      (a.readTime ? '<span class="art-meta-dot"></span><span>' + a.readTime + '</span>' : '') +
    '</div>' +

    // Headline
    '<h1 class="art-headline">' + a.headline + '</h1>' +

    // Deck
    (a.deck ? '<p class="art-deck">' + a.deck + '</p>' : '') +

    // Hero (inside 760 px — same column as body text)
    buildHero(a) +

    // Body paragraphs, pull-quote, tags, CTA
    buildBody(a);

  // Related posts (1080 px)
  var relatedItems = (a.relatedIds || [])
    .map(function(id){ return NEWS.find(function(n){ return n.id === id; }); })
    .filter(Boolean)
    .slice(0, 3);

  if (relatedItems.length) {
    relatedEl.style.display = '';
    relatedEl.innerHTML =
      '<div class="eyebrow">More from the newsroom</div>' +
      '<div class="art-related-grid news-grid">' +
        relatedItems.map(relatedCardHTML).join('') +
      '</div>';
  }
})();
</script>
</body>
</html>
