<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Publications — Vinicius Rosa · NUS Faculty of Dentistry</title>
<meta name="description" content="Selected publications by A/P Vinicius Rosa on biomaterials, regeneration, AI-guided design and translational oral-health technologies.">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/components.css">
<style>
  /* Copy-citation control (page-scoped) */
  .cite-btn{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--font-sans); font-size:12.5px; font-weight:600;
    color:var(--text-faint); background:none; border:none; padding:0;
    cursor:pointer; letter-spacing:.01em; transition:color .15s ease;
  }
  .cite-btn:hover{ color:var(--blue-600); }
  .cite-btn.copied{ color:var(--teal-600); }
  .cite-btn svg{ width:13px; height:13px; }
  /* Archive row: keep whole row clickable, float the cite button top-right */
  .archive-item-wrap{ position:relative; }
  .archive-item-wrap .archive-item{ padding-right:70px; }
  .archive-item-wrap .cite-btn{ position:absolute; top:var(--space-5); right:0; }
</style>
</head>
<body>
<div id="app">
<main>

  <!-- ── Page header ───────────────────────────────────────── -->
  <div style="max-width:var(--container-base);margin:0 auto;padding:var(--space-10) var(--gutter) var(--space-8);">
    <div class="eyebrow">Selected research</div>
    <h1 class="display" style="font-size:var(--fs-page-title);margin-top:12px;">Publications</h1>
    <p style="margin-top:16px;font-family:var(--font-serif);font-style:italic;font-size:20px;line-height:1.5;color:var(--text-muted);">Selected work on biomaterials, regeneration, AI-guided design and translational oral-health technologies.</p>
  </div>

  <!-- ── Filters ───────────────────────────────────────────── -->
  <div class="pub-filters">
    <div class="filter-row">
      <button class="pill-btn active"   data-filter="all"  onclick="setPubFilter('all')">All</button>
      <button class="pill-btn inactive" data-filter="bio"  onclick="setPubFilter('bio')">Biomaterials &amp; biointerfaces</button>
      <button class="pill-btn inactive" data-filter="regen"onclick="setPubFilter('regen')">Regeneration &amp; living models</button>
      <button class="pill-btn inactive" data-filter="ai"   onclick="setPubFilter('ai')">AI, methods &amp; translation</button>
      <input class="pub-search-input" type="text" id="pub-search" placeholder="Search…" oninput="onPubSearch(this.value)" aria-label="Search publications">
    </div>
  </div>

  <div id="pub-empty" class="empty-state" style="display:none;">No publications match this filter.</div>

  <!-- ── Featured breakthroughs ────────────────────────────── -->
  <div class="pub-section" id="featured-section">
    <div class="section-divider">
      <div class="eyebrow" style="color:var(--orange-600);">Selected breakthroughs</div>
      <div class="section-divider-line"></div>
    </div>
    <div class="featured-grid" id="featured-grid"></div>
  </div>

  <!-- ── Archive ───────────────────────────────────────────── -->
  <div class="pub-section" style="padding-bottom:var(--space-12);">
    <div class="section-divider">
      <div class="eyebrow">Selected archive</div>
      <div class="section-divider-line"></div>
    </div>
    <div class="archive-list" id="archive-list"></div>
  </div>

</main>
</div><!-- /app -->

<script src="assets/js/data/pubs.js"></script>
<script src="assets/js/shared.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────
let pubFilter = 'all';
let pubQuery  = '';
const openBlocks = {};

// ── Category colours ───────────────────────────────────────────
function catTone(cat) {
  if (cat === 'ai')   return { wash:'var(--wash-orange)', ink:'var(--orange-600)', label:'AI, methods & translation',    cls:'tag-orange' };
  if (cat === 'regen')return { wash:'var(--wash-teal)',   ink:'var(--teal-600)',   label:'Regeneration & living models',  cls:'tag-teal' };
  if (cat === 'bio')  return { wash:'var(--wash-blue)',   ink:'var(--blue-600)',   label:'Biomaterials & biointerfaces',  cls:'tag-blue' };
  return                     { wash:'var(--wash-teal)',   ink:'var(--teal-600)',   label:'Collaborative applications',    cls:'tag-teal' };
}

// ── HTML builders ──────────────────────────────────────────────
function authorsHTML(a){ return a ? a.replace(/Rosa V\./g, '<strong style="color:var(--text-strong);">Rosa V.</strong>') : ''; }

// ── Copy citation ──────────────────────────────────────────────
const CITE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
function citeBtnHTML(p, label) {
  const idx = PUBS.indexOf(p);
  return `<button type="button" class="cite-btn" onclick="copyCitation(${idx}, this)" aria-label="Copy citation" title="Copy citation">${CITE_ICON}<span>${label}</span></button>`;
}
function buildCitation(p) {
  const a = p.authors ? p.authors.trim().replace(/\.?$/, '.') : '';
  let s = (a ? a + ' ' : '') + p.title + '. ' + p.venue + '. ' + p.year + '.';
  if (p.doi) s += ' https://doi.org/' + p.doi;
  return s;
}
function copyCitation(idx, btn) {
  const p = PUBS[idx];
  if (!p) return;
  const text = buildCitation(p);
  const span = btn.querySelector('span');
  const orig = span ? span.textContent : '';
  const done = () => {
    if (span) span.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { if (span) span.textContent = orig; btn.classList.remove('copied'); }, 1600);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.setAttribute('readonly', '');
  ta.style.position = 'fixed'; ta.style.top = '-1000px'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta); done();
}

function pubCardHTML(p) {
  const ct = catTone(p.category);
  return `<div class="pub-card">
    <div class="pub-card-thumb" style="background:${ct.wash};">
      ${p.thumb ? `<img src="${p.thumb}" alt="" loading="lazy" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;">` : ''}
      <span class="pub-card-cat" style="color:${ct.ink};">${p.badge || ct.label}</span>
    </div>
    <div class="pub-card-body">
      <div class="pub-title">${p.title}</div>
      ${p.authors ? `<div style="margin-top:5px;font-size:12.5px;line-height:1.5;color:var(--text-muted);">${authorsHTML(p.authors)}</div>` : ''}
      <div class="pub-venue-row">
        <span class="pub-venue">${p.venue}</span>
        <span class="pub-year">${p.year}</span>
      </div>
      ${p.summary ? `<div class="pub-authors" style="margin-top:8px;font-style:italic;">${p.summary}</div>` : ''}
      <div class="pub-footer" style="display:flex;gap:1.25rem;flex-wrap:wrap;align-items:center;">
        ${p.spotlight ? `<a href="${p.spotlight}" class="view-link" style="font-weight:700;">Read spotlight →</a>` : ''}
        ${p.doi ? `<a href="https://doi.org/${p.doi}" target="_blank" rel="noopener" class="view-link">View study →</a>` : (p.spotlight ? '' : '<span class="view-link" style="color:var(--text-faint);">View study</span>')}
        ${citeBtnHTML(p, 'Cite')}
      </div>
    </div>
  </div>`;
}

function archiveItemHTML(p) {
  const inner = `<span class="archive-item-year">${p.year}</span>
    <span class="archive-item-body">
      <span class="archive-title">${p.title}</span>
      ${p.authors ? `<span style="display:block;font-size:12px;line-height:1.45;color:var(--text-muted);margin:3px 0 1px;">${authorsHTML(p.authors)}</span>` : ''}
      <span class="archive-meta">
        <span class="archive-venue">${p.venue}</span>${p.spotlight ? ' <span class="archive-venue" style="color:var(--orange-600); font-weight:700;">· Spotlight</span>' : ''}
      </span>
    </span>`;
  const link = p.spotlight
    ? `<a href="${p.spotlight}" class="archive-item">${inner}</a>`
    : (p.doi
        ? `<a href="https://doi.org/${p.doi}" target="_blank" rel="noopener" class="archive-item">${inner}</a>`
        : `<div class="archive-item">${inner}</div>`);
  return `<div class="archive-item-wrap">${link}${citeBtnHTML(p, 'Cite')}</div>`;
}

// ── Filters ────────────────────────────────────────────────────
function setPubFilter(id) {
  pubFilter = id;
  document.querySelectorAll('[data-filter]').forEach(b => {
    const active = b.dataset.filter === id;
    b.classList.toggle('active', active);
    b.classList.toggle('inactive', !active);
  });
  render();
}

function onPubSearch(val) {
  pubQuery = val.toLowerCase();
  render();
}

// ── Accordion toggle ───────────────────────────────────────────
function toggleBlock(id) {
  const cur = !!openBlocks[id];
  openBlocks[id] = !cur;
  const body = document.getElementById('ab-' + id);
  const chev = document.getElementById('chev-' + id);
  if (body) body.style.display = !cur ? 'block' : 'none';
  if (chev) chev.textContent = !cur ? '▲' : '▼';
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  const filtered = PUBS.filter(p => {
    const matchCat = pubFilter === 'all' || p.category === pubFilter;
    const matchQ   = !pubQuery || (p.title + p.venue).toLowerCase().includes(pubQuery);
    return matchCat && matchQ;
  });

  document.getElementById('pub-empty').style.display = filtered.length === 0 ? 'block' : 'none';

  // Featured
  const featured = filtered.filter(p => p.featured).slice(0, 8);
  const featSec  = document.getElementById('featured-section');
  const featGrid = document.getElementById('featured-grid');
  if (featured.length > 0) {
    featSec.style.display = '';
    featGrid.innerHTML = featured.map(pubCardHTML).join('');
  } else {
    featSec.style.display = 'none';
  }

  // Archive blocks
  const blocks = [
    { id:'b1', label:'2024 – 2026', min:2024, max:2026 },
    { id:'b2', label:'2021 – 2023', min:2021, max:2023 },
    { id:'b3', label:'2018 – 2020', min:2018, max:2020 },
    { id:'b4', label:'2012 – 2017', min:2012, max:2017 },
    { id:'b5', label:'2007 – 2011', min:2007, max:2011 },
  ];
  const archiveEl = document.getElementById('archive-list');
  archiveEl.innerHTML = blocks.map(b => {
    const items = filtered.filter(p => p.year >= b.min && p.year <= b.max).sort((a,z) => z.year - a.year);
    if (!items.length) return '';
    const open = !!openBlocks[b.id];
    return `<div class="archive-group" id="ag-${b.id}">
      <button class="archive-toggle" onclick="toggleBlock('${b.id}')">
        <span class="archive-year-label">${b.label}</span>
        <span style="display:flex;align-items:center;gap:10px;">
          <span class="archive-count">${items.length} items</span>
          <span class="archive-chevron" id="chev-${b.id}">${open ? '▲' : '▼'}</span>
        </span>
      </button>
      <div id="ab-${b.id}" style="display:${open?'block':'none'};">
        <div class="archive-items">${items.map(archiveItemHTML).join('')}</div>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
