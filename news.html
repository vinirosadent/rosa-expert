<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>News — Vinicius Rosa · NUS Faculty of Dentistry</title>
<meta name="description" content="Top stories, press coverage, awards and appointments across A/P Rosa's research.">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
<div id="app">
<main>

  <div style="max-width:var(--container-base);margin:0 auto;padding:var(--space-10) var(--gutter) 0;">

    <div style="max-width:680px;margin-bottom:var(--space-8);">
      <div class="eyebrow">Newsroom</div>
      <h1 class="display" style="font-size:clamp(1.9rem,3.4vw,2.6rem);margin-top:12px;">Latest news</h1>
      <p style="margin-top:14px;font-size:17px;line-height:1.6;color:var(--text-muted);">Top stories, press coverage, awards and appointments across A/P Rosa's research.</p>
    </div>

    <!-- Featured editorial split: lead (60%) + 2 secondary stacked (40%) -->
    <div class="news-editorial-split" id="news-editorial-split">
      <div id="news-feat-primary"></div>
      <div class="news-secondary-stack" id="news-feat-secondary"></div>
    </div>

    <!-- Category filters -->
    <div style="margin-bottom:var(--space-6);">
      <div class="filter-row">
        <button class="pill-btn active"   data-cat="all"          onclick="setFilter('all')">All</button>
        <button class="pill-btn inactive" data-cat="press"        onclick="setFilter('press')">Press</button>
        <button class="pill-btn inactive" data-cat="awards"       onclick="setFilter('awards')">Awards</button>
        <button class="pill-btn inactive" data-cat="appointments" onclick="setFilter('appointments')">Appointments</button>
        <button class="pill-btn inactive" data-cat="institutional"onclick="setFilter('institutional')">Institutional</button>
      </div>
    </div>

    <!-- 4-col grid for the rest of the news items -->
    <div class="news-grid-4" id="news-grid" style="padding-bottom:var(--space-12);"></div>

  </div>

</main>
</div><!-- /app -->

<script src="assets/js/data/news.js"></script>
<script src="assets/js/shared.js"></script>
<script>
let newsFilter = 'all';

function articleHref(item) {
  return 'news/' + item.slug + '.html';
}

// ── Featured horizontal card ───────────────────────────────────
function newsFeaturedHTML(item) {
  const imgCls = 'nc-feat-img-' + item.tone;
  const srcCls = 'nc-feat-src-' + item.tone;
  return `<a href="${articleHref(item)}" class="nc-feat" style="height:100%;min-height:300px;text-decoration:none;display:flex;">
    <div class="nc-feat-img ${imgCls}" style="flex:0 0 42%;"></div>
    <div class="nc-feat-body">
      <div style="display:inline-flex;align-items:center;background:var(--wash-orange);color:var(--orange-600);font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:4px 10px;border-radius:var(--radius-pill);margin-bottom:12px;">Lead story</div>
      <div class="nc-feat-meta">
        <span class="${srcCls}">${item.source.toUpperCase()}</span>
        <span class="nc-feat-sep">/</span>
        <span class="nc-feat-date">${item.date.toUpperCase()}</span>
      </div>
      <div class="nc-feat-headline" style="font-size:clamp(17px,2.2vw,22px);">${item.headline}</div>
      <span class="nc-feat-cta">Read full story →</span>
    </div>
  </a>`;
}

// ── Secondary card (vertical bar + text) ──────────────────────
function newsSecondaryHTML(item) {
  const barCls = 'nc-secondary-bar-' + item.tone;
  const srcCls = 'nc-secondary-src-' + item.tone;
  return `<a href="${articleHref(item)}" class="nc-secondary" style="text-decoration:none;flex:1;display:flex;">
    <div class="nc-secondary-bar ${barCls}"></div>
    <div class="nc-secondary-body">
      <div class="nc-secondary-meta">
        <span class="${srcCls}">${item.source.toUpperCase()}</span>
        <span style="width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block;flex-shrink:0;"></span>
        <span class="nc-secondary-date">${item.date.toUpperCase()}</span>
      </div>
      <div class="nc-secondary-headline">${item.headline}</div>
      <span class="nc-secondary-cta">Read more →</span>
    </div>
  </a>`;
}

// ── Standard grid card ─────────────────────────────────────────
function newsCardHTML(item) {
  const barCls = 'news-card-bar-' + item.tone;
  const srcCls = 'news-card-source-' + item.tone;
  return `<a href="${articleHref(item)}" class="news-card" style="text-decoration:none;">
    <div class="news-card-bar ${barCls}"></div>
    <div class="news-card-body">
      <div class="news-card-meta">
        <span class="${srcCls}">${item.source}</span>
        <span style="width:3px;height:3px;border-radius:50%;background:var(--border-strong);"></span>
        <span class="news-card-date">${item.date}</span>
      </div>
      <div class="news-card-headline">${item.headline}</div>
      <span class="news-card-cta">Read more →</span>
    </div>
  </a>`;
}

// ── Filter ─────────────────────────────────────────────────────
function setFilter(id) {
  newsFilter = id;
  document.querySelectorAll('[data-cat]').forEach(b => {
    b.classList.toggle('active',   b.dataset.cat === id);
    b.classList.toggle('inactive', b.dataset.cat !== id);
  });
  renderGrid();
}

// ── Render grid (items 3+, filtered) ──────────────────────────
function renderGrid() {
  const rest = NEWS.slice(3).filter(n => newsFilter === 'all' || n.category === newsFilter);
  const grid = document.getElementById('news-grid');
  grid.innerHTML = rest.length
    ? rest.map(newsCardHTML).join('')
    : '<p style="color:var(--text-muted);padding:var(--space-10) 0;grid-column:1/-1;">No items in this category.</p>';
}

// ── Init ───────────────────────────────────────────────────────
document.getElementById('news-feat-primary').innerHTML   = newsFeaturedHTML(NEWS[0]);
document.getElementById('news-feat-secondary').innerHTML = NEWS.slice(1, 3).map(newsSecondaryHTML).join('');
renderGrid();
</script>
</body>
</html>
