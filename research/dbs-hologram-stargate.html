<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBS Hologram — Wormhole Stargate</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #000; }
body { font-family: 'Courier New', 'Liberation Mono', monospace; cursor: grab; user-select: none; }
body.dragging { cursor: grabbing; }

#stage {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 70% at 50% 40%, #060c1d 0%, #02050f 50%, #000 100%);
}
canvas { display: block; }

.scan-overlay {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,
    transparent 0, transparent 3px,
    rgba(80,210,220,.028) 3px, rgba(80,210,220,.028) 4px);
  pointer-events: none; z-index: 50; mix-blend-mode: screen;
}
.vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 85% 80% at 50% 50%,
    transparent 50%, rgba(0,0,0,.45) 85%, rgba(0,0,0,.8) 100%);
  pointer-events: none; z-index: 48;
}
.label {
  position: fixed;
  color: rgba(160,235,225,.75);
  font-size: 11px; letter-spacing: 2px; font-weight: 300;
  text-shadow: 0 0 8px rgba(80,200,220,.6);
  pointer-events: none; z-index: 60;
  transform: translate(-50%, 0);
  transition: opacity .3s;
  white-space: nowrap;
}
.bracket {
  position: fixed; width: 32px; height: 32px;
  border: 1px solid rgba(80,200,220,.45);
  z-index: 55; pointer-events: none;
}
.brk-tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
.brk-tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
.brk-bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
.brk-br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }
.hint {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%);
  color: rgba(140,210,220,.45);
  font-size: 10px; letter-spacing: 2.5px;
  z-index: 55; pointer-events: none;
  transition: opacity .8s;
}
.hint.fade { opacity: 0; }
</style>
</head>

<div class="vignette"></div>
<div class="bracket brk-tl"></div>

<div class="bracket brk-bl"></div>
<div class="bracket brk-br"></div>
<div class="hint" id="hint">⊙ DRAG TO ROTATE · SCROLL TO ZOOM</div>
<div id="labels"></div>

  // Dominant per-layer "anchor colors" for the wormhole gradient
  // These represent the bias of each DBS weighting variant in the gradient
  const layerColors = [
    new THREE.Color(0.92, 0.18, 0.38),  // M: red-magenta
    new THREE.Color(0.22, 0.48, 0.92),  // P: blue
    new THREE.Color(0.22, 0.78, 0.42),  // H: green
    new THREE.Color(0.60, 0.30, 0.92),  // C: purple-violet
  ];

  const planes = [];
  const labelEls = [];
  const loader = new THREE.TextureLoader();
  const planeGeo = new THREE.PlaneGeometry(PLANE_SIZE, PLANE_SIZE);

  layers.forEach((layer, i) => {
    loader.load(layer.img, (texture) => {
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      const mat = new THREE.MeshBasicMaterial({
        map: texture, transparent: true, opacity: LAYER_OPACITY,
        depthWrite: false, side: THREE.DoubleSide, blending: THREE.NormalBlending,
      });
      const plane = new THREE.Mesh(planeGeo, mat);
      plane.position.z = layer.z;
      plane.renderOrder = 10 - i;  // M drawn last (on top)
      plane.userData = { name: layer.name, baseOpacity: LAYER_OPACITY };
      scene.add(plane);
      planes[i] = plane;
    });

    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = layer.name;
    lbl.id = 'lbl-' + i;
    labelContainer.appendChild(lbl);
    labelEls[i] = lbl;
  });

  // Cyan rim around each plane
  const rimGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(PLANE_SIZE * 1.01, PLANE_SIZE * 1.01));
  layers.forEach((layer) => {
    const rimMat = new THREE.LineBasicMaterial({
      color: 0x60d0d0, transparent: true, opacity: 0.30,
    });
    const rim = new THREE.LineSegments(rimGeo, rimMat);
    rim.position.z = layer.z - 0.002;
    scene.add(rim);
  });

  // ===== WORMHOLE STARGATES =====
  // Each wormhole: outer translucent shell (TubeGeometry, vertex-color gradient
  // following layer colors) + stack of rings along the path (12 dim + 4 bright at
  // layer intersections). Radius matches painted-circle radius (~0.17 unit).
  const wormholeData = {"1": {"class": "high", "points": [[-1.547, 0.641, 2.25], [-1.5, 1.297, 0.75], [-1.641, 1.359, -0.75], [-1.594, 1.188, -2.25]]}, "2": {"class": "high", "points": [[-1.266, -0.203, 2.25], [-1.125, 0.828, 0.75], [-1.438, 0.75, -0.75], [-1.656, 0.406, -2.25]]}, "3": {"class": "mid", "points": [[-0.625, 0.141, 2.25], [-1.609, -0.453, 0.75], [-1.641, -0.625, -0.75], [-1.641, -0.859, -2.25]]}, "4": {"class": "mid", "points": [[0.547, 0.219, 2.25], [0.094, -0.188, 0.75], [0.203, 0.0, -0.75], [0.375, -0.359, -2.25]]}, "5": {"class": "low", "points": [[-0.438, -1.578, 2.25], [0.531, -1.641, 0.75], [0.094, -1.484, -0.75], [0.016, -1.328, -2.25]]}, "6": {"class": "high", "points": [[-0.141, 1.531, 2.25], [-0.438, 1.594, 0.75], [0.156, 1.562, -0.75], [-0.328, 1.578, -2.25]]}, "7": {"class": "low", "points": [[1.562, -1.375, 2.25], [1.656, -1.156, 0.75], [1.609, -1.484, -0.75], [1.594, -1.078, -2.25]]}, "8": {"class": "mid", "points": [[1.547, 0.844, 2.25], [1.656, 0.094, 0.75], [1.609, 0.75, -0.75], [1.625, 0.844, -2.25]]}, "9": {"class": "low", "points": [[1.547, -0.172, 2.25], [1.688, -0.469, 0.75], [1.641, -0.906, -0.75], [1.656, -0.141, -2.25]]}};

  const TUBE_RADIUS = 0.17;
  const RING_RADIUS = 0.185;
  const ANCHOR_RING_RADIUS = 0.205;

  const tubeShells = [];     // outer shells (color cycle)
  const rings = [];          // dim intermediate rings
  const anchorRings = [];    // bright anchor rings at layer crossings

  // Helper: get color along the wormhole at parametric t ∈ [0, 1]
  // Linear interpolation across the 4 layer anchors (at t = 0, 1/3, 2/3, 1)
  function colorAtT(t) {
    const segLen = 1/3;
    const segIdx = Math.min(2, Math.floor(t / segLen));
    const localT = (t - segIdx * segLen) / segLen;
    const c0 = layerColors[segIdx];
    const c1 = layerColors[segIdx + 1];
    return new THREE.Color(
      c0.r + (c1.r - c0.r) * localT,
      c0.g + (c1.g - c0.g) * localT,
      c0.b + (c1.b - c0.b) * localT,
    );
  }

  Object.keys(wormholeData).forEach(groupId => {
    const data = wormholeData[groupId];
    const pts = data.points.map(p => new THREE.Vector3(p[0], p[1], p[2]));
    const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);

    // ---- OUTER SHELL ----
    const TUBULAR_SEG = 96;
    const RADIAL_SEG = 24;
    const tubeGeo = new THREE.TubeGeometry(curve, TUBULAR_SEG, TUBE_RADIUS, RADIAL_SEG, false);
    // Vertex colors: gradient along length (M → P → H → C)
    const colors = new Float32Array(tubeGeo.attributes.position.count * 3);
    for (let i = 0; i <= TUBULAR_SEG; i++) {
      const t = i / TUBULAR_SEG;
      const c = colorAtT(t);
      for (let j = 0; j <= RADIAL_SEG; j++) {
        const idx = (i * (RADIAL_SEG + 1) + j) * 3;
        colors[idx] = c.r; colors[idx+1] = c.g; colors[idx+2] = c.b;
      }
    }
    tubeGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const shellMat = new THREE.MeshBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.32,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide,
    });
    const shell = new THREE.Mesh(tubeGeo, shellMat);
    shell.renderOrder = 18;
    shell.userData = { baseOpacity: 0.32, phase: Math.random() * Math.PI * 2 };
    scene.add(shell);
    tubeShells.push(shell);

    // ---- RINGS at the 4 layer-plane intersections only ----
    // (intermediate decorative rings removed — only the tunnel + layer-pierce markers)
    const anchorTs = [0, 1/3, 2/3, 1];

    // Reusable function to place a ring at parameter t
    function placeRing(t, majorR, minorR, color, opacity, isAnchor) {
      const pt = curve.getPoint(t);
      const tangent = curve.getTangent(t).normalize();
      const torusGeo = new THREE.TorusGeometry(majorR, minorR, 8, 28);
      const torusMat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      const ring = new THREE.Mesh(torusGeo, torusMat);
      ring.position.copy(pt);
      // Orient ring so its central axis aligns with the curve tangent.
      // TorusGeometry's default axis is +Z.
      // Use lookAt to set the +Z axis toward tangent direction.
      ring.lookAt(pt.clone().add(tangent));
      ring.renderOrder = isAnchor ? 22 : 20;
      ring.userData = {
        baseOpacity: opacity,
        phase: Math.random() * Math.PI * 2,
        isAnchor,
      };
      scene.add(ring);
      return ring;
    }

    // Anchor rings — at the 4 layer intersections, in the layer color
    anchorTs.forEach((t, i) => {
      const c = layerColors[i];
      const r = placeRing(t, ANCHOR_RING_RADIUS, 0.014, c, 0.92, true);
      anchorRings.push(r);
    });
  });

  // ===== INTERACTION =====
  let isDragging = false, prevX = 0, prevY = 0, interacted = false;
  function markInteracted() {
    if (!interacted) { interacted = true; setTimeout(() => hintEl.classList.add('fade'), 1500); }
  }
  canvas.addEventListener('mousedown', (e) => {
    isDragging = true; prevX = e.clientX; prevY = e.clientY;
    document.body.classList.add('dragging'); markInteracted();
  });
  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    targetAngleY -= (e.clientX - prevX) * 0.006;
    targetAngleX -= (e.clientY - prevY) * 0.006;
    targetAngleX = Math.max(-Math.PI/3, Math.min(Math.PI/3, targetAngleX));
    targetAngleY = Math.max(-Math.PI/2, Math.min(Math.PI/2, targetAngleY));
    prevX = e.clientX; prevY = e.clientY;
  });
  window.addEventListener('mouseup', () => {
    isDragging = false; document.body.classList.remove('dragging');
  });
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    targetDistance += e.deltaY * 0.008;
    targetDistance = Math.max(3, Math.min(18, targetDistance));
    markInteracted();
  }, { passive: false });

  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      markInteracted();
    }
  });
  canvas.addEventListener('touchmove', (e) => {
    if (!touchStart || e.touches.length !== 1) return;
    targetAngleY -= (e.touches[0].clientX - touchStart.x) * 0.006;
    targetAngleX -= (e.touches[0].clientY - touchStart.y) * 0.006;
    targetAngleX = Math.max(-Math.PI/3, Math.min(Math.PI/3, targetAngleX));
    targetAngleY = Math.max(-Math.PI/2, Math.min(Math.PI/2, targetAngleY));
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function updateLabels() {
    const w = window.innerWidth, h = window.innerHeight;
    layers.forEach((layer, i) => {
      if (!planes[i]) return;
      const cornerLocal = new THREE.Vector3(PLANE_SIZE/2 + 0.15, PLANE_SIZE/2 + 0.05, layer.z);
      cornerLocal.project(camera);
      if (cornerLocal.z > 1) { labelEls[i].style.opacity = '0'; return; }
      const x = (cornerLocal.x + 1) * w / 2;
      const y = (-cornerLocal.y + 1) * h / 2;
      labelEls[i].style.left = x + 'px';
      labelEls[i].style.top = y + 'px';
      labelEls[i].style.opacity = Math.max(0.4, Math.min(0.85, 1 - cornerLocal.z * 0.5));
    });
  }

  let time = 0;
  function render() {
    time += 0.01;
    updateCamera();

    // Plane subtle flicker
    planes.forEach((p, i) => {
      if (!p) return;
      const flicker = 1 + Math.sin(time * 1.5 + i * 1.5) * 0.04;
      p.material.opacity = p.userData.baseOpacity * flicker;
    });

    // Shell breathing
    tubeShells.forEach(s => {
      s.material.opacity = s.userData.baseOpacity * (1 + Math.sin(time * 1.2 + s.userData.phase) * 0.20);
    });

    // Dim rings pulse
    rings.forEach(r => {
      r.material.opacity = r.userData.baseOpacity * (1 + Math.sin(time * 1.6 + r.userData.phase) * 0.30);
    });

    // Anchor rings pulse (slower, stronger)
    anchorRings.forEach(r => {
      r.material.opacity = r.userData.baseOpacity * (1 + Math.sin(time * 0.9 + r.userData.phase) * 0.12);
    });

    renderer.render(scene, camera);
    updateLabels();
    requestAnimationFrame(render);
  }
  render();
})();
</script>

</body>
</html>
