<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Worked example — cement on demand (prototype v4)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#120C0E;--pink:#D67B88;--crimson:#7A1F2D;--amber:#DE934F;--ivory:#F7F4EB;
--text:rgba(247,244,235,.86);--text2:rgba(247,244,235,.72);--muted:rgba(247,244,235,.5);--line:rgba(247,244,235,.12);
--serif:'Playfair Display',Georgia,serif;--sans:'Inter',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;--ease:cubic-bezier(.16,1,.3,1);}
*{box-sizing:border-box}
body{margin:0;background:transparent;color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;padding:12px;}
.we{width:100%;max-width:900px;margin:0 auto;border:1px solid var(--line);border-radius:4px;background:linear-gradient(158deg,rgba(122,31,45,.06),rgba(9,5,6,.28));padding:30px 34px 22px;position:relative;overflow:hidden;}
.we-eye{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);}
.we-step{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);float:right;}
.we-h{font-family:var(--serif);font-weight:500;font-size:clamp(1.35rem,2.4vw,1.85rem);line-height:1.14;color:var(--ivory);margin:12px 0 0;letter-spacing:-.01em;min-height:1.15em;transition:opacity .45s var(--ease);}
.we-body{font-size:.98rem;line-height:1.6;color:var(--text2);margin:6px 0 0;max-width:70ch;min-height:2.6em;transition:opacity .45s var(--ease);}
.stage{position:relative;height:292px;margin:26px 0 6px;transition:opacity .42s var(--ease),transform .42s var(--ease);}
.panel{position:absolute;inset:0;}
.cvwrap{position:relative;width:100%;height:100%;border-radius:8px;overflow:hidden;border:1px solid rgba(247,244,235,.08);background:radial-gradient(120% 100% at 62% 26%,rgba(122,31,45,.16),rgba(9,5,6,.55));}
.cvwrap canvas{position:relative;display:block;width:100%;height:100%;}
.ov{position:absolute;pointer-events:none;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;}
.ov-tl{top:10px;left:12px;font-size:10.5px;color:var(--amber);}
.ov-tr{top:10px;right:12px;font-size:10.5px;color:var(--muted);}
.ov-leg{bottom:9px;left:12px;font-size:9.5px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;}
.ov-leg i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}
.metos{display:flex;gap:10px;justify-content:center;align-items:flex-start;height:236px;}
.mt{flex:1;max-width:150px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;}
.mt svg{width:84px;height:84px;display:block}.mt .ml{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);}
.mt .mg{font-size:11px;line-height:1.35;color:var(--muted);max-width:15ch;}
.trade{text-align:center;font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:rgba(247,244,235,.85);margin:10px 0 0;}
.proof{display:flex;flex-direction:column;gap:11px;height:100%;justify-content:center;padding:8px 10px;}
.pf-row{display:grid;grid-template-columns:40px 150px 1fr;align-items:center;gap:14px;}
.pf-row svg{width:40px;height:40px;display:block;}
.pf-lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);}
.pf-track{position:relative;height:12px;border-radius:2px;background:rgba(247,244,235,.07);}
.pf-fill{position:absolute;left:0;top:0;height:100%;border-radius:2px;background:linear-gradient(90deg,var(--crimson),var(--amber));width:0;transition:width 1.1s var(--ease);}
.pf-pred{position:absolute;top:-5px;width:2px;height:22px;background:var(--ivory);opacity:0;transition:left .8s var(--ease),opacity .5s var(--ease);}
.pf-pred::before{content:"";position:absolute;top:-4px;left:-2px;width:6px;height:6px;border-radius:50%;background:var(--ivory);}
.pf-note{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:center;margin-top:4px;}
.pf-note #pf-cem{color:var(--amber);}
@media(max-width:640px){.pf-row{grid-template-columns:32px 92px 1fr;gap:8px}.pf-row svg{width:32px;height:32px}}
.prob{position:relative;height:226px;max-width:560px;margin:0 auto;}
.prob-links{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.prob-core{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:66px;height:66px;border-radius:50%;border:1px solid rgba(222,147,79,.45);display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(222,147,79,.18),rgba(9,5,6,.45));}
.prob-core span{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;color:var(--amber);text-align:center;line-height:1.35;}
.pnode{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;width:86px;transition:opacity .6s var(--ease);}
.pnode .pn-emb svg{width:36px;height:36px;display:block;}
.pnode .pn-lab{font-family:var(--mono);font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);}
.pn-gauge{width:52px;height:5px;border-radius:3px;background:rgba(247,244,235,.08);overflow:hidden;}
.pn-fill{display:block;height:100%;width:60%;background:linear-gradient(90deg,var(--crimson),var(--amber));transition:width .8s var(--ease);}
.pn-badge{height:11px;font-size:11px;line-height:1;transition:color .4s;color:transparent;}
.pnode.up .pn-badge{color:var(--amber);}
.pnode.down{opacity:.42;}
.pnode.down .pn-badge{color:var(--pink);}
.prob-links path{transition:stroke .4s var(--ease);}
.prob-links path.act{stroke:rgba(222,147,79,.95);stroke-width:1;}
@keyframes pf-fwd{from{stroke-dashoffset:0}to{stroke-dashoffset:-6.4}}
@keyframes pf-rev{from{stroke-dashoffset:0}to{stroke-dashoffset:6.4}}
.prob-links path.fwd{animation:pf-fwd .6s linear infinite;}
.prob-links path.rev{animation:pf-rev .6s linear infinite;}
.we-play{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;background:rgba(9,5,6,.74);backdrop-filter:blur(2px);border-radius:4px;cursor:pointer;transition:opacity .5s var(--ease);}
.we.started .we-play{opacity:0;pointer-events:none;}
.we-playbtn{font-family:var(--mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);background:var(--amber);border:none;border-radius:999px;padding:13px 30px;cursor:pointer;box-shadow:0 0 30px -6px rgba(222,147,79,.8);}
.we-playsub{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.pf-check{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:10px;padding:2px 8px;transition:all .3s var(--ease);}
.pf-check.on{color:var(--ink);background:var(--amber);border-color:var(--amber);box-shadow:0 0 14px -2px rgba(222,147,79,.8);}
.pf-row.setting svg{filter:drop-shadow(0 0 5px rgba(222,147,79,.85));}
.arc{display:flex;align-items:center;justify-content:space-between;margin-top:12px;position:relative;}
.arc::before{content:"";position:absolute;left:6%;right:6%;top:9px;height:1px;background:var(--line);}
.arc .prog{position:absolute;left:6%;top:9px;height:1px;background:var(--amber);transition:width .5s var(--ease);box-shadow:0 0 8px 1px rgba(222,147,79,.6);}
.node{position:relative;z-index:2;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:9px;padding:0;flex:1;}
.node .dot{width:11px;height:11px;border-radius:50%;background:#3a2a2d;border:1px solid var(--line);transition:all .3s var(--ease);}
.node.done .dot{background:var(--amber);border-color:var(--amber);}
.node.active .dot{background:var(--amber);border-color:var(--amber);box-shadow:0 0 12px 2px rgba(222,147,79,.7);transform:scale(1.25);}
.node .t{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);transition:color .3s;}
.node.active .t{color:var(--ivory);}
.nav{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:14px;}
.nav .btns{display:flex;gap:8px}
.nav button{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ivory);background:none;border:1px solid rgba(247,244,235,.24);padding:9px 16px;cursor:pointer;transition:all .3s var(--ease);}
.nav button:hover{background:var(--amber);color:var(--ink);border-color:var(--amber);}
.nav button[disabled]{opacity:.3;pointer-events:none;}
.link{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);text-decoration:none;border-bottom:1px solid transparent;}
.link:hover{border-color:var(--amber);}
@media(max-width:640px){.mt .mg{display:none}.metos{height:150px}.node .t{font-size:8px}}
</style></head>
<body>
<div class="we" id="we">
  <div><span class="we-eye">Worked example — J Dent Res 2023</span><span class="we-step" id="stepno">01 / 04</span></div>
  <h2 class="we-h" id="weh"></h2>
  <p class="we-body" id="web"></p>
  <div class="stage" id="stage"></div>
  <div class="arc" id="arc"><div class="prog" id="prog"></div></div>
  <div class="nav"><a class="link" id="full" href="#" style="visibility:hidden">Read the full study &rarr;</a><div class="btns"><button id="prev">&larr; Prev</button><button id="next">Next &rarr;</button></div></div>
  <div class="we-play" id="we-play"><button class="we-playbtn" id="we-playbtn">&#9654;&nbsp;&nbsp;Play</button><span class="we-playsub">Watch how a cement is designed on demand</span></div>
</div>

/* ---------- gene tree ---------- */
function initTree(cv){
 var S=setup(cv),ctx=S.x,W=S.w,H=S.h,GENES=4,FOUND=14,MAXGEN=14;
 var COMP=['#DE934F','#E7D6BE','#D67B88','#8E2C3A'],DIAL=['str','rad','flow','set','ph'],target={str:.85,rad:.30,flow:.35,set:.75,ph:.6};
 function cl(x){return x<0?0:x>1?1:x;}function gf(x){return x<.06?.06:(x>1?1:x);}function sg(x){return 1/(1+Math.exp(-x));}
 function props(g){var a=g[0],b=g[1],w=g[2],ac=g[3];return{str:cl(.45+.55*a-.55*b-.45*w),rad:cl(.10+.90*b),flow:cl(.15+.85*w),set:cl(.40+.60*ac-.50*w),ph:cl(.30+.70*a)};}
 function fit(g){var p=props(g),s=0;for(var i=0;i<DIAL.length;i++)s+=Math.abs(p[DIAL[i]]-target[DIAL[i]]);return 1-s/DIAL.length;}
 function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
 var rng=mb(7);function mut(g,amt){var c=g.slice();for(var i=0;i<GENES;i++)if(rng()<.5)c[i]=gf(c[i]+(rng()-.5)*amt);return c;}
 var padL=38,padR=58,padT=30,padB=40,TOPY=padT+8,BOTY=H-padB-8;function xOf(g){return padL+(W-padL-padR)*(g/MAXGEN);}
 var nodes=[],founders=[],backbone={},convY=(TOPY+BOTY)/2,id=0;
 function mk(g,gen,par,by){var n={id:id++,g:g,gen:gen,par:par,ch:[],ext:false,by:by,x:0,y:0,f:fit(g)};nodes.push(n);if(par)par.ch.push(n);return n;}
 var frontier=[];for(var i=0;i<FOUND;i++){var by=TOPY+(BOTY-TOPY)*i/(FOUND-1);var n=mk([gf(rng()),gf(rng()),gf(rng()),gf(rng())],0,null,by);founders.push(n);frontier.push(n);}
 for(var gen=1;gen<=MAXGEN;gen++){var kids=[],late=gen>MAXGEN-3;
  for(var fi=0;fi<frontier.length;fi++){var par=frontier[fi],amt=gen<5?.44:.30,bp=gen<4?.30:(late?.05:.22),nk=1+((rng()<bp&&par.f>.42)?1:0);
   for(var c=0;c<nk;c++){var dy=(rng()-.5)*(gen<5?30:(late?9:20)),cby=par.by+dy;if(cby<TOPY)cby=TOPY;if(cby>BOTY)cby=BOTY;kids.push(mk(mut(par.g,c===0?amt*.5:amt),gen,par,cby));}}
  var thr=.40+.40*(gen/MAXGEN),sv=[];for(var ki=0;ki<kids.length;ki++){var kd=kids[ki];if(rng()<sg((kd.f-thr)*9))sv.push(kd);else kd.ext=true;}
  sv.sort(function(a,b){return b.f-a.f;});var cap=Math.max(2,Math.round(FOUND*(1-.92*Math.pow(gen/MAXGEN,1.7))));
  if(sv.length>cap){for(var s2=cap;s2<sv.length;s2++)sv[s2].ext=true;sv=sv.slice(0,cap);}
  if(sv.length===0){var b=kids.sort(function(a,b){return b.f-a.f;})[0];b.ext=false;sv=[b];}frontier=sv;}
 var sm=0,cn=0;for(i=0;i<nodes.length;i++)if(!nodes[i].ext&&nodes[i].gen===MAXGEN){sm+=nodes[i].by;cn++;}convY=cn?sm/cn:convY;
 for(i=0;i<nodes.length;i++){var nd=nodes[i],t=Math.pow(nd.gen/MAXGEN,1.3)*.82;nd.y=nd.by*(1-t)+convY*t;nd.x=xOf(nd.gen);}
 var bf=null;frontier.forEach(function(n){if(!bf||n.f>bf.f)bf=n;});var cu=bf;while(cu){backbone[cu.id]=true;cu=cu.par;}
 function disc(cx,cy,r,g,a,glow){var s=g[0]+g[1]+g[2]+g[3]||1,st=-Math.PI/2;ctx.globalAlpha=a;for(var i=0;i<GENES;i++){var an=2*Math.PI*g[i]/s;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,st,st+an);ctx.closePath();ctx.fillStyle=COMP[i];ctx.fill();st+=an;}if(glow){ctx.beginPath();ctx.arc(cx,cy,r+2,0,6.283);ctx.strokeStyle='#F4A24A';ctx.lineWidth=2.4;ctx.stroke();}ctx.globalAlpha=1;}

  for(i=0;i<nodes.length;i++){var nd=nodes[i];if(!nd.ext&&nd.gen===cg&&nd.x<=rev+2){var bb=backbone[nd.id];disc(nd.x,nd.y,bb?11:8,nd.g,1,bb);}}
  var tx=xOf(MAXGEN)+26,ty=convY;ctx.save();ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(222,147,79,.30)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(xOf(MAXGEN),ty);ctx.lineTo(tx-9,ty);ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle='rgba(222,147,79,.85)';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(tx,ty,8,0,6.283);ctx.stroke();ctx.beginPath();ctx.arc(tx,ty,3,0,6.283);ctx.stroke();
  ctx.fillStyle='#F4C58C';ctx.font='9px "IBM Plex Mono",monospace';ctx.textAlign='center';ctx.fillText('TARGET',tx,ty-13);ctx.restore();

 function loop(ts){var t=ts*.001,dt=Math.min(.05,last?(ts-last)/1000:.016);last=ts;if(play<MAXGEN){play+=dt*speed;if(play>MAXGEN)play=MAXGEN;}else{if(!hold)hold=t+3.0;else if(t>hold){play=0;hold=0;}}frame(play);anim.raf=requestAnimationFrame(loop);}

}
/* ---------- proof: icon gauges (predicted vs measured) ---------- */
function proofHTML(){var rows=[['set','Setting time'],['ph','pH · alkalinity'],['flow','Flowability'],['str','Strength'],['xray','Radiopacity']];
 return '<div class="proof">'+rows.map(function(r){return '<div class="pf-row" data-k="'+r[0]+'">'+metaphor(r[0])+'<span class="pf-lab">'+r[1]+'</span><div class="pf-track"><div class="pf-fill"></div><div class="pf-pred"></div></div></div>';}).join('')+'<div class="pf-note"><span class="pf-check" id="pf-check">&#10003; Check</span> <span id="pf-cem">Cement 1 of 4</span> · marker = predicted target, bar = measured</div></div>';}
function initResults(){var cem=[[[.42,.72,.82,.46,.88],[.40,.76,.80,.48,.90]],[[.30,.55,.60,.55,.62],[.33,.52,.63,.53,.60]],[[.92,.60,.88,.40,.66],[.88,.63,.85,.42,.68]],[[.55,.80,.66,.70,.58],[.58,.77,.64,.72,.60]]];
 var rows=[].slice.call(document.querySelectorAll('#stage .pf-row')),lab=document.getElementById('pf-cem'),chk=document.getElementById('pf-check'),idx=0;
 function T(fn,ms){anim.tos.push(setTimeout(fn,ms));}
 function cyc(){var c=cem[idx],P=c[0],M=c[1];if(lab)lab.textContent='Cement '+(idx+1)+' of 4';
  rows.forEach(function(r){r.classList.remove('setting','checked');r.querySelector('.pf-fill').style.width='0%';var pr=r.querySelector('.pf-pred');pr.style.opacity='0';pr.style.left='0%';});
  if(chk)chk.classList.remove('on');
  rows.forEach(function(r,i){T(function(){var pr=r.querySelector('.pf-pred');pr.style.opacity='1';pr.style.left='calc('+(P[i]*100).toFixed(0)+'% - 1px)';r.classList.add('setting');},500+i*600);});
  var setEnd=500+rows.length*600+700;
  T(function(){if(chk)chk.classList.add('on');},setEnd);
  rows.forEach(function(r,i){T(function(){r.querySelector('.pf-fill').style.width=(M[i]*100).toFixed(0)+'%';r.classList.add('checked');r.classList.remove('setting');},setEnd+350+i*350);});
  var fillEnd=setEnd+350+rows.length*350+1200;
  T(function(){idx=(idx+1)%cem.length;cyc();},fillEnd+1600);}
 cyc();}
/* ---------- payoff: proliferation / qPCR / ARS ---------- */
function drawCell(ctx,x,y,s,seed,al){ctx.save();ctx.translate(x,y);ctx.globalAlpha=al;var L=6;ctx.beginPath();
 for(var i=0;i<=L;i++){var a=i/L*6.283,r=s*(.72+.5*((Math.sin(seed+i*2.3)+1)/2)),px=Math.cos(a)*r,py=Math.sin(a)*r;
  if(i===0)ctx.moveTo(px,py);else{var a0=(i-.5)/L*6.283,rr=s*1.15;ctx.quadraticCurveTo(Math.cos(a0)*rr,Math.sin(a0)*rr,px,py);}}
 ctx.closePath();ctx.fillStyle='rgba(214,123,136,.15)';ctx.strokeStyle='rgba(214,123,136,.5)';ctx.lineWidth=1;ctx.fill();ctx.stroke();
 ctx.beginPath();ctx.arc(0,0,s*.36,0,6.283);ctx.fillStyle='rgba(158,52,74,.9)';ctx.fill();ctx.restore();}
function initPayoff(cv){
 var S=setup(cv),ctx=S.x,W=S.w,H=S.h,col=W/3,t0=performance.now();
  var seeds=[];for(var i=0;i<26;i++)seeds.push({x:Math.random(),y:Math.random(),s:.7+Math.random()*.6,ph:Math.random()*6});
 var mins=[];for(i=0;i<16;i++)mins.push({a:Math.random()*6.283,r:.15+Math.random()*.8,ph:Math.random()*6,sp:5+((Math.random()*4)|0)});
 function frame(now){var el=(now-t0)/1000;ctx.clearRect(0,0,W,H);
  // titles
  ctx.textAlign='center';ctx.font='9px "IBM Plex Mono",monospace';ctx.fillStyle='rgba(247,244,235,.55)';
  ctx.fillText('PROLIFERATION',col*.5,20);ctx.fillText('GENE EXPRESSION (qPCR)',col*1.5,20);ctx.fillText('MINERALIZATION (ARS)',col*2.5,20);
  ctx.strokeStyle='rgba(247,244,235,.08)';ctx.beginPath();ctx.moveTo(col,28);ctx.lineTo(col,H-14);ctx.moveTo(col*2,28);ctx.lineTo(col*2,H-14);ctx.stroke();
  // P1 proliferation: dish + growing cells + day label
  var cx=col*.5,cy=H*.52,dr=Math.min(col*.42,H*.32);
  ctx.strokeStyle='rgba(247,244,235,.16)';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(cx,cy,dr,0,6.283);ctx.stroke();
  var cyc=(el%4.5)/4.5,phase=cyc<.33?0:(cyc<.66?1:2),nCell=[7,15,24][phase],day=['1 d','3 d','5 d'][phase];
  for(i=0;i<nCell;i++){var sd=seeds[i];var ang=sd.x*6.283,rad=Math.sqrt(sd.y)*dr*.86;drawCell(ctx,cx+Math.cos(ang)*rad,cy+Math.sin(ang)*rad,3.4*sd.s,sd.ph,.9);}
  ctx.fillStyle='#DE934F';ctx.font='11px "IBM Plex Mono",monospace';ctx.fillText(day,cx,cy+dr+18);
  // P2 qPCR bars (phenomenon, no numbers): control vs three repair genes
  var g4=[['Control',.22,1],['RUNX2',.62,0],['COL-1',.86,0],['ALP',1.0,0]],bw=(col-52)/4,base=H-40,bh=H*.52,bx=col+22;
  for(i=0;i<4;i++){var app=Math.max(0,Math.min(1,(el-.4-i*.45)/1.1)),h=g4[i][1]*bh*app,x=bx+i*(bw+5);
   if(g4[i][2]){ctx.fillStyle='rgba(247,244,235,.22)';}else{var gr=ctx.createLinearGradient(0,base,0,base-bh);gr.addColorStop(0,'#7A1F2D');gr.addColorStop(1,'#DE934F');ctx.fillStyle=gr;}
   ctx.fillRect(x,base-h,bw,h);
   ctx.fillStyle='rgba(247,244,235,.7)';ctx.textAlign='center';ctx.font='8px "IBM Plex Mono",monospace';ctx.fillText(g4[i][0],x+bw/2,base+12);}
  ctx.fillStyle='#F4C58C';ctx.textAlign='center';ctx.font='9px "IBM Plex Mono",monospace';ctx.fillText('higher than control ↑',col*1.5,42);
  // P3 ARS dish
  var mx=col*2.5,my=H*.52,mr=Math.min(col*.42,H*.32);
  ctx.strokeStyle='rgba(247,244,235,.16)';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(mx,my,mr,0,6.283);ctx.stroke();
  ctx.save();ctx.beginPath();ctx.arc(mx,my,mr,0,6.283);ctx.clip();ctx.fillStyle='rgba(247,244,235,.03)';ctx.fillRect(mx-mr,my-mr,mr*2,mr*2);
  for(i=0;i<mins.length;i++){var m=mins[i],ap=Math.max(0,Math.min(1,(el-1-i*.35)/1.4)),rr=(2+ap*4);if(ap<=0)continue;var px=mx+Math.cos(m.a)*m.r*mr*.9,py=my+Math.sin(m.a)*m.r*mr*.9;
   ctx.save();ctx.globalAlpha=ap;ctx.translate(px,py);ctx.fillStyle='#b3324a';ctx.strokeStyle='rgba(200,60,80,.8)';ctx.lineWidth=1;
   ctx.beginPath();for(var s=0;s<m.sp;s++){var a=m.ph+s/m.sp*6.283,rq=rr*(.7+.5*((s%2)));if(s===0)ctx.moveTo(Math.cos(a)*rq,Math.sin(a)*rq);else ctx.lineTo(Math.cos(a)*rq,Math.sin(a)*rq);}ctx.closePath();ctx.fill();ctx.restore();}
  ctx.restore();
  ctx.fillStyle='#DE934F';ctx.textAlign='center';ctx.font='11px "IBM Plex Mono",monospace';ctx.fillText('More mineral than control',mx,my+mr+18);
  if(el>10)t0=now;
  anim.raf=requestAnimationFrame(frame);}
 if(reduce){t0=performance.now()-10;frame(performance.now());}else anim.raf=requestAnimationFrame(frame);
}
/* ---------- problem: trade-off composition ---------- */
function problemHTML(){
 var ns=[{k:'set',l:'Setting',x:50,y:15},{k:'flow',l:'Flowability',x:86,y:45},{k:'xray',l:'Radiopacity',x:72,y:84},{k:'str',l:'Strength',x:28,y:84},{k:'ph',l:'pH',x:14,y:45}];
 var svg='<svg class="prob-links" viewBox="0 0 100 100" preserveAspectRatio="none">';
 ns.forEach(function(n){svg+='<line x1="50" y1="48" x2="'+n.x+'" y2="'+n.y+'" stroke="rgba(247,244,235,0.10)" stroke-width="0.4"/>';});
 svg+='<path id="lk-a" d="M50,15 Q78,24 86,45" fill="none" stroke="rgba(214,123,136,0.4)" stroke-width="0.7" stroke-dasharray="1.6 1.6"/>';
 svg+='<path id="lk-b" d="M72,84 Q50,95 28,84" fill="none" stroke="rgba(214,123,136,0.4)" stroke-width="0.7" stroke-dasharray="1.6 1.6"/></svg>';
 var nd=ns.map(function(n,i){return '<div class="pnode" data-i="'+i+'" style="left:'+n.x+'%;top:'+n.y+'%"><span class="pn-badge"></span><span class="pn-emb">'+metaphor(n.k)+'</span><span class="pn-lab">'+n.l+'</span><span class="pn-gauge"><span class="pn-fill"></span></span></div>';}).join('');
 return '<div class="prob">'+svg+'<div class="prob-core"><span>ONE<br>RECIPE</span></div>'+nd+'</div><p class="trade">Five demands, one shared recipe — push one up (▲) and its partner gives way (▼).</p>';
}
function initProblem(){
 var ns=[].slice.call(document.querySelectorAll('#stage .pnode'));if(!ns.length)return;
 var neutral=[.6,.62,.5,.66,.55];
 var lkA=document.querySelector('#stage #lk-a'),lkB=document.querySelector('#stage #lk-b');
 function set(i,lv,dir){var n=ns[i];n.classList.remove('up','down');if(dir)n.classList.add(dir);n.querySelector('.pn-fill').style.width=(lv*100).toFixed(0)+'%';n.querySelector('.pn-badge').textContent=dir==='up'?'▲':dir==='down'?'▼':'';}
 function neut(){for(var i=0;i<ns.length;i++)set(i,neutral[i],'');if(lkA)lkA.setAttribute('class','');if(lkB)lkB.setAttribute('class','');}
 var pairs=[[0,1],[1,0],[2,3],[3,2]],step=0;
 function tick(){var p=pairs[step%pairs.length];neut();set(p[0],.95,'up');set(p[1],.26,'down');var up=p[0],link=(up===0||up===1)?lkA:lkB,dir=(up===0||up===2)?'fwd':'rev';if(link)link.setAttribute('class','act '+dir);step++;}
 neut();setTimeout(tick,600);if(!reduce)anim.iv=setInterval(tick,2600);
}
/* ---------- steps ---------- */
var steps=[
 {k:"Problem",h:"One cement, five demands that fight each other.",b:"One cement must set at the right speed, stay alkaline, flow into tiny spaces, resist force and show on an X-ray — but the ingredients are shared, so improving one property tends to worsen another.",render:function(){return problemHTML();},after:function(){initProblem();}},
 {k:"Method",h:"Borrowing Darwin: let the recipes evolve.",b:"Each disc is a recipe; its slices are the ingredients. Every generation the algorithm breeds new mixes, unfit branches die into faint dead-ends, and the fittest lineage (gold) survives — natural selection by computer — until it meets the target.",
  render:function(){return '<div class="cvwrap"><span class="ov ov-tl">Natural selection, run by computer</span><span class="ov ov-tr">Gen 0 / 14</span><canvas></canvas><span class="ov ov-leg"><span><i style="background:#DE934F"></i>C3S powder</span><span><i style="background:#E7D6BE"></i>Radiopacifier</span><span><i style="background:#D67B88"></i>Water</span><span><i style="background:#8E2C3A"></i>Accelerator</span></span></div>';},after:function(){initTree(document.querySelector('#stage canvas'));}},
 {k:"Results",h:"What the algorithm predicted, the cements delivered.",b:"The gold marker is each property’s target; the bar is what was measured. For every designed cement, the measurement lands on the prediction.",render:function(){return proofHTML();},after:function(){initResults();}},
 {k:"Conclusion",h:"Cement on demand — and alive to the pulp.",b:"The cements are also biologically active: pulp stem cells keep proliferating, switch on repair genes (RUNX2, COL-1, ALP) and lay down far more mineral than untreated controls.",
  render:function(){return '<div class="cvwrap"><canvas></canvas></div>';},after:function(){initPayoff(document.querySelector('#stage canvas'));},link:"publications/designing-c3s-cements-on-demand.html"}
];
var cur=0,walking=false,walkTimer=0;var arc=document.getElementById('arc'),prog=document.getElementById('prog'),full=document.getElementById('full'),stage=document.getElementById('stage'),weh=document.getElementById('weh'),web=document.getElementById('web');
steps.forEach(function(s,i){var b=document.createElement('button');b.className='node';b.innerHTML='<span class="dot"></span><span class="t">'+s.k+'</span>';b.onclick=function(){stopWalk();go(i);};arc.appendChild(b);});
var nodes=[].slice.call(arc.querySelectorAll('.node'));
var DWELL=[9000,12000,17000,0];
function scheduleWalk(){clearTimeout(walkTimer);if(!walking)return;var d=DWELL[cur]||0;if(d>0)walkTimer=setTimeout(function(){if(cur<steps.length-1)go(cur+1);},d);}
function paint(i){var s=steps[i];weh.textContent=s.h;web.textContent=s.b;document.getElementById('stepno').textContent='0'+(i+1)+' / 0'+steps.length;
 var p=document.createElement('div');p.className='panel';p.innerHTML=s.render();stage.innerHTML='';stage.appendChild(p);if(s.after)setTimeout(s.after,40);
 nodes.forEach(function(n,j){n.classList.toggle('active',j===i);n.classList.toggle('done',j<i);});
 prog.style.width=(i/(steps.length-1))*88+'%';full.style.visibility=s.link?'visible':'hidden';if(s.link)full.href=s.link;
 document.getElementById('prev').disabled=i===0;document.getElementById('next').disabled=i===steps.length-1;
 stage.style.opacity=1;stage.style.transform='none';weh.style.opacity=1;web.style.opacity=1;scheduleWalk();}
function go(i){stopAll();cur=i;
 stage.style.opacity=0;stage.style.transform='translateY(10px)';weh.style.opacity=0;web.style.opacity=0;
 setTimeout(function(){paint(i);},reduce?0:360);}
document.getElementById('prev').onclick=function(){stopWalk();if(cur>0)go(cur-1);};
document.getElementById('next').onclick=function(){stopWalk();if(cur<steps.length-1)go(cur+1);};
document.addEventListener('keydown',function(e){if(e.key=='ArrowRight'&&cur<steps.length-1){stopWalk();go(cur+1);}if(e.key=='ArrowLeft'&&cur>0){stopWalk();go(cur-1);}});
function stopWalk(){walking=false;clearTimeout(walkTimer);}
function start(){document.getElementById('we').classList.add('started');walking=true;go(0);}
document.getElementById('we-playbtn').addEventListener('click',function(e){e.stopPropagation();start();});
document.getElementById('we-play').addEventListener('click',start);
go(0);
})();
</script>
